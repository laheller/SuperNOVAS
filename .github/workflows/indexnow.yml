name: IndexNow
permissions:
  contents: read
  pull-requests: write

on:
  page_build

jobs:
  indexnow:
    runs-on: ubuntu-latest
    
    steps:
      - name: IndexNow
        uses: bojieyang/indexnow-action@v2
        with:
          sitemap-location: 'https://sigmyne.github.io/SuperNOVAS/sitemap.xml'
          key: ${{ secrets.INDEXNOW_KEY }}
          limit: 1000
 
